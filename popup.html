<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 350px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; background-color: #f8f9fa; }
        h2 { margin-top: 0; font-size: 16px; color: #202124; display: flex; justify-content: space-between; align-items: center;}
        .clear-btn { background: #d93025; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .clear-btn:hover { background: #b3261e; }
        #log-container { max-height: 400px; overflow-y: auto; background: white; border: 1px solid #dadce0; border-radius: 8px; padding: 10px; }
        .log-entry { font-family: monospace; font-size: 11px; background: #f1f3f4; padding: 8px; margin-bottom: 8px; border-radius: 4px; border-left: 4px solid #1a73e8; white-space: pre-wrap; word-wrap: break-word; }
        .log-entry.paste { border-left-color: #34a853; }
        .empty-state { text-align: center; color: #5f6368; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>
        TWFF Event Logs
        <button id="clearBtn" class="clear-btn">Clear Logs</button>
    </h2>
    <div id="log-container">
        </div>

    <script src="popup.js"></script>
</body>
</html>
